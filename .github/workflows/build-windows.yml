name: Build RibbonTracker (Windows desktop)

on:
  workflow_dispatch:
  push:
    paths:
      - "desktop/**"
      - ".github/workflows/build-windows.yml"
      # Rebuild when the engine or UI change so the bundled fallback stays current.
      - "ribbon_parser.py"
      - "ribbon_tracker_app.py"
      - "error_reporter.py"

permissions:
  contents: write   # required to publish / update the GitHub Release

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Toolchain pins — see desktop/RibbonTracker.spec top-of-file for WHY.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Upgrade pip + wheel
        run: |
          python -m pip install --upgrade pip wheel

      - name: Install desktop requirements
        run: |
          pip install -r requirements-desktop.txt

      - name: Re-pin setuptools 65.5.1 LAST so it wins
        run: |
          pip install --force-reinstall "setuptools==65.5.1"

      # ── ENGINE TEST (synthetic fixture, no customer data) ──────────
      - name: Engine test (parse + classify)
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -m pytest tests/test_parse.py -v

      # ── UI SMOKE TEST (AppTest: landing + cross-report roll-up) ─────
      - name: UI smoke test (AppTest)
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python test_ui.py

      # ── FULL CLICK-THROUGH + INGESTION AUDIT ───────────────────────
      # Exercises every interactive path + the filename edge cases
      # (unicode/uppercase/.xlsm/duplicate names, junk, corrupt, no-grid,
      # auto-save, clean route). Runs on Windows too so path/locking
      # differences are caught before the build.
      - name: Click-through + ingestion audit
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python tests/test_audit.py

      # Bake the error-report webhook from the repo SECRET (never committed —
      # public repo, Slack auto-revokes leaked webhooks). Absent -> reporting off.
      - name: Bake error-report webhook (from secret)
        shell: pwsh
        env:
          SLACK_ERROR_WEBHOOK: ${{ secrets.SLACK_ERROR_WEBHOOK }}
        run: |
          if ($env:SLACK_ERROR_WEBHOOK) {
            Set-Content -NoNewline -Path "_webhook.cfg" -Value $env:SLACK_ERROR_WEBHOOK
            Write-Host "wrote _webhook.cfg (error reporting ON)"
          } else {
            Write-Host "no SLACK_ERROR_WEBHOOK secret; error reporting OFF"
          }

      - name: PyInstaller build
        run: |
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist)  { Remove-Item -Recurse -Force dist  }
          pyinstaller RibbonTracker.spec --noconfirm --clean

      # ── FROZEN PIPELINE SELF-TEST ──────────────────────────────────
      # /_stcore/health proves only that the SERVER booted. This runs the
      # exe with RT_SELFTEST=1 so it exercises the real run-time paths INSIDE
      # the frozen bundle — openpyxl read+write, pandas ExcelWriter, the
      # parser, and altair->vega->jsonschema->rfc3987 chart rendering — and
      # exits non-zero (with a logged traceback) on any missing bundled
      # data file. This is the authoritative "no Windows packaging issues"
      # gate. (env var is local to this step, so it never leaks into the
      # boot self-test below.)
      - name: Frozen pipeline self-test (RT_SELFTEST inside the exe)
        shell: pwsh
        run: |
          $env:RT_SELFTEST = "1"
          $exe = "dist\RibbonTracker\RibbonTracker.exe"
          # Windowed (GUI-subsystem) exe -> must -Wait to get the exit code.
          $p = Start-Process -FilePath $exe -Wait -PassThru
          $log = Join-Path $env:USERPROFILE ".ribbonTracker\selftest.log"
          if (Test-Path $log) {
            Write-Host "----- selftest.log -----"
            Get-Content $log
          } else {
            Write-Error "FROZEN SELF-TEST FAILED — no selftest.log written (exe never ran the self-test)."
            exit 1
          }
          if ($p.ExitCode -ne 0) {
            Write-Error "FROZEN SELF-TEST FAILED — full pipeline raised inside the frozen exe (exit $($p.ExitCode)). A bundled data file is missing. Release will NOT be updated."
            exit 1
          }
          Write-Host "FROZEN SELF-TEST PASSED."

      # ── BOOT SELF-TEST — the authoritative "does it launch" gate ────
      - name: Boot self-test (launch exe, poll /_stcore/health)
        shell: pwsh
        run: |
          $exe = "dist\RibbonTracker\RibbonTracker.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "BOOT SELF-TEST FAILED — $exe missing after PyInstaller build."
            exit 1
          }

          $out = "boot_out.txt"
          $err = "boot_err.txt"
          Remove-Item $out,$err -ErrorAction SilentlyContinue

          Write-Host "Launching $exe ..."
          $proc = Start-Process -FilePath $exe `
                                 -PassThru `
                                 -RedirectStandardOutput $out `
                                 -RedirectStandardError  $err

          $ok = $false
          for ($i = 0; $i -lt 45; $i++) {     # 45 * 2s ~= 90s
            Start-Sleep -Seconds 2
            if ($proc.HasExited) {
              Write-Host "Process exited early with code $($proc.ExitCode)."
              break
            }
            try {
              $r = Invoke-WebRequest -Uri "http://127.0.0.1:8512/_stcore/health" `
                                      -UseBasicParsing -TimeoutSec 2
              if ($r.Content.Trim() -eq "ok") {
                $ok = $true
                Write-Host ("Health = ok after ~{0}s." -f (($i + 1) * 2))
                break
              }
            } catch {
              # Server not up yet — keep polling.
            }
          }

          if (-not $proc.HasExited) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }
          Get-Process -Name "RibbonTracker" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

          Write-Host "----- boot_out.txt -----"
          Get-Content $out -ErrorAction SilentlyContinue
          Write-Host "----- boot_err.txt -----"
          Get-Content $err -ErrorAction SilentlyContinue
          $log = Join-Path $env:USERPROFILE ".ribbonTracker\ribbontracker.log"
          $logText = ""
          if (Test-Path $log) {
            Write-Host "----- ribbontracker.log -----"
            Get-Content $log -ErrorAction SilentlyContinue
            $logText = Get-Content $log -Raw -ErrorAction SilentlyContinue
          }

          if (-not $ok) {
            Write-Error "BOOT SELF-TEST FAILED — exe never returned /_stcore/health = ok within 90s. Release will NOT be updated."
            exit 1
          }

          # /_stcore/health = ok only proves the SERVER booted, not that the UI
          # script imported. A missing bundled data file (e.g. the altair ->
          # rfc3987_syntax .lark grammar) raises in ribbon_tracker_app.py while
          # health still answers ok. Fail if the launcher log shows a traceback.
          if ($logText -match "Traceback|FileNotFoundError|ModuleNotFoundError|ImportError") {
            Write-Error "BOOT SELF-TEST FAILED — server healthy but the UI script raised (see log above). A bundled import/data file is missing. Release will NOT be updated."
            exit 1
          }
          Write-Host "BOOT SELF-TEST PASSED."

      - name: Zip the dist folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\RibbonTracker\*" `
                            -DestinationPath "dist\RibbonTracker-Windows.zip" `
                            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RibbonTracker-Windows
          path: desktop/dist/RibbonTracker-Windows.zip
          retention-days: 14

      # ── Publish / update the permanent Release ────────────────────
      - name: Publish to permanent Release (windows-build)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag   = "windows-build"
          $title = "Ribbon Tracker — Windows desktop build"
          $notes = "Permanent build link. Rewritten by CI on every successful boot self-test."
          gh release create $tag --title $title --notes $notes --latest 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Release $tag already exists; continuing to upload."
          }
          gh release upload $tag "dist\RibbonTracker-Windows.zip" --clobber
